name: Build & Deploy Flask App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build Docker & Deploy to Kubeadm
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPO: ${{ secrets.ECR_REPO }}
      NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
      IMAGE_TAG: ${{ github.sha }}
      # Nuove variabili per il cluster EC2 personale
      K8S_SERVER: https://98.92.7.200:6443
      K8S_TOKEN: ${{ secrets.KUBEADM_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Docker image
      run: |
        docker build -t $ECR_REPO:$IMAGE_TAG .
        docker push $ECR_REPO:$IMAGE_TAG

    # SOSTITUITO: Non usiamo più "aws eks update-kubeconfig". 
    # Generiamo un kubeconfig manuale che usa il token e salta i controlli TLS (--insecure-skip-tls-verify)
    - name: Set up Kubeconfig for Kubeadm EC2
      run: |
        mkdir -p ~/.kube
        kubectl config set-cluster kubeadm-cluster --server=${{ env.K8S_SERVER }} --insecure-skip-tls-verify=true
        kubectl config set-credentials github-actions-user --token=${{ env.K8S_TOKEN }}
        kubectl config set-context kubeadm-context --cluster=kubeadm-cluster --user=github-actions-user
        kubectl config use-context kubeadm-context

    # MODIFICATO: Cambiato service.type da LoadBalancer a NodePort per farlo funzionare su EC2 standard
    - name: Helm upgrade (or install)
      run: |
    - name: Helm upgrade (or install)
      run: |
        helm upgrade --install flask-app ./flask-app-chart \
          --namespace $NAMESPACE \
          --create-namespace \
          --set image.repository=$ECR_REPO \
          --set image.tag=$IMAGE_TAG \
          --set service.type=NodePort \
          --set imagePullSecrets.name=regcred

